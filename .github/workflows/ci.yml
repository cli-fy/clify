name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: bun i --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run coverage
      - run: bun run knip
      - run: bun run build

  bun:
    name: Bun 1.3.13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - run: bun i --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run coverage
      - run: bun run knip
      - run: bun run build
